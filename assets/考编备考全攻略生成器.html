<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考编备考全攻略生成器 · 增强版 v2.0</title>
<meta name="description" content="考生填写基本信息，自动生成专属岗位分析、城市策略、学习计划和完整备考攻略">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --P:#F3A04C;--A:#E58522;--OK:#40B43E;--WA:#EBA400;--ER:#E65C53;--PF:#fff;
  --BG:#F2F2F4;--CA:#fff;--PA:#FEFDFC;
  --T1:rgba(0,0,0,.82);--T2:rgba(0,0,0,.52);--T3:rgba(0,0,0,.36);
  --B1:rgba(0,0,0,.09);--S3:rgba(0,0,0,.03);--S4:rgba(0,0,0,.04);
  --S6:rgba(0,0,0,.06);--S8:rgba(0,0,0,.08);--S12:rgba(0,0,0,.12);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Segoe UI",sans-serif;
  font-size:14px;color:var(--T1);background:var(--BG)
}
html,body{min-height:100vh}
/* ── Layout ── */
.page{display:grid;grid-template-columns:308px 1fr;min-height:100vh}
.lpanel{background:var(--CA);border-right:.5px solid var(--B1);padding:20px 16px;overflow-y:auto;position:sticky;top:0;height:100vh}
.rmain{background:var(--BG);overflow:hidden}
/* ── Panel ── */
.p-logo{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.p-logo .icon{width:34px;height:34px;border-radius:10px;background:var(--P);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.p-logo .info h1{font-size:15px;font-weight:600;line-height:1.2}
.p-logo .info p{font-size:11px;color:var(--T2);margin-top:2px}
.sec{margin-top:14px;padding-top:14px;border-top:.5px solid var(--B1)}
.sec-label{font-size:10px;font-weight:600;color:var(--T3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
label.lab{display:block;font-size:12px;color:var(--T2);margin-bottom:4px}
.inp,.sel{width:100%;height:34px;border:.5px solid var(--B1);border-radius:8px;background:var(--S4);color:var(--T1);padding:0 10px;font-size:13px;outline:none;font-family:inherit;transition:border-color .15s,background .15s}
.inp:focus,.sel:focus{border-color:var(--P);background:var(--CA)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g8{height:8px}.g12{height:12px}
/* range */
.range-wrap{display:flex;align-items:center;gap:8px}
.range-wrap input[type=range]{flex:1;accent-color:var(--P);height:4px}
.range-val{font-size:12px;font-weight:600;min-width:44px;text-align:right;color:var(--T1)}
/* chips */
.chips{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.chip{display:flex;align-items:center;gap:7px;min-height:32px;padding:6px 10px;border:.5px solid var(--B1);border-radius:8px;background:var(--S4);font-size:12px;cursor:pointer;transition:background .12s,border-color .12s}
.chip:hover{background:var(--S8)}
.chip input{accent-color:var(--P);margin:0;flex-shrink:0}
/* buttons */
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn{height:34px;padding:0 14px;border:0;border-radius:8px;background:var(--P);color:var(--PF);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap}
.btn:hover{background:var(--A)}
.btn2{height:34px;padding:0 12px;border:.5px solid var(--B1);border-radius:8px;background:var(--S6);color:var(--T1);font-size:12px;cursor:pointer;font-family:inherit;transition:background .12s;white-space:nowrap}
.btn2:hover{background:var(--S12)}
/* ── Hero ── */
.hero{padding:18px 20px 16px;background:var(--CA);border-bottom:.5px solid var(--B1)}
.hero-title{font-size:17px;font-weight:600;margin-bottom:4px}
.hero-sub{font-size:12px;color:var(--T2);margin-bottom:14px;line-height:1.5}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:var(--S4);border-radius:10px;padding:12px 14px}
.kpi-val{font-size:22px;font-weight:600;line-height:1;color:var(--T1)}
.kpi-lbl{font-size:11px;color:var(--T2);margin-top:5px}
/* ── Tabs ── */
.tabs{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;background:var(--CA);border-bottom:.5px solid var(--B1);position:sticky;top:0;z-index:10}
.tab{height:28px;padding:0 10px;border:.5px solid var(--B1);border-radius:999px;background:var(--S4);color:var(--T2);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.tab:hover{background:var(--S8)}
.tab.on{background:color-mix(in srgb,var(--A) 14%,transparent);border-color:color-mix(in srgb,var(--A) 30%,transparent);color:var(--A);font-weight:500}
/* ── Content ── */
.content{padding:16px}
.view{display:block}.hide{display:none}
/* ── Cards ── */
.card{border:.5px solid var(--B1);border-radius:12px;background:var(--CA);padding:14px;margin-bottom:12px}
.card-t{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
/* ── List ── */
.list{display:grid}
.li{display:grid;grid-template-columns:88px 1fr;gap:10px;padding:8px 0;border-bottom:.5px solid var(--S8)}
.li:last-child{border-bottom:0}
.li-k{font-size:12px;font-weight:600;color:var(--T1)}
.li-v{font-size:12px;color:var(--T2);line-height:1.6}
/* ── Table ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tbl th{font-weight:500;color:var(--T2);border-bottom:.5px solid var(--B1);padding:8px 6px;text-align:left}
.tbl td{border-bottom:.5px solid var(--S8);padding:8px 6px;vertical-align:top;color:var(--T1);line-height:1.5}
.tbl tr:last-child td{border-bottom:0}
/* ── Tags ── */
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{height:22px;display:inline-flex;align-items:center;padding:0 8px;border:.5px solid var(--B1);border-radius:999px;background:var(--S4);font-size:11px;color:var(--T2)}
.tok{color:var(--OK);background:color-mix(in srgb,var(--OK) 14%,transparent);border-color:color-mix(in srgb,var(--OK) 26%,transparent)}
.twa{color:var(--WA);background:color-mix(in srgb,var(--WA) 14%,transparent);border-color:color-mix(in srgb,var(--WA) 26%,transparent)}
.ter{color:var(--ER);background:color-mix(in srgb,var(--ER) 12%,transparent);border-color:color-mix(in srgb,var(--ER) 26%,transparent)}
/* ── Matrix ── */
.matrix{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.mini{border:.5px solid var(--B1);border-radius:10px;padding:12px;background:var(--S3)}
.mini b{font-size:13px;display:block;margin-bottom:5px}
.mini p{font-size:12px;color:var(--T2);line-height:1.55;margin:0}
/* ── Bar ── */
.bar-row{margin-bottom:12px}
.bar-hd{display:flex;justify-content:space-between;margin-bottom:5px}
.bar-hd span{font-size:13px;font-weight:600}
.bar-hd small{font-size:11px;color:var(--T2)}
.bar{height:8px;border-radius:999px;background:var(--S8);overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--P),var(--A))}
/* ── Note ── */
.note{font-size:12px;line-height:1.65;color:var(--T2);padding:10px 12px;background:var(--S4);border-radius:10px;margin-top:10px}
.note.wn{border-left:3px solid var(--WA)}
/* ── Timeline ── */
.tl{display:grid;gap:10px}
.tl-row{display:grid;grid-template-columns:90px 1fr;gap:12px;align-items:start}
.tl-dt{font-size:12px;font-weight:600;color:var(--A);padding-top:3px}
.tl-box{border:.5px solid var(--B1);border-radius:10px;padding:10px 12px;background:var(--CA)}
.tl-box b{font-size:13px;display:block;margin-bottom:5px}
.tl-box p{font-size:12px;color:var(--T2);line-height:1.55;margin:0}
.tl-hint{font-size:11px;color:var(--T3);margin-top:6px;line-height:1.5}
/* ── Mono ── */
.mono{white-space:pre-wrap;font-size:12px;line-height:1.7;color:var(--T1);border:.5px solid var(--B1);border-radius:10px;background:var(--S3);padding:14px;max-height:520px;overflow:auto;font-family:inherit}
/* ── Print ── */
@media print{
  .lpanel,.tabs,.btn-row{display:none!important}
  .page{grid-template-columns:1fr!important}
  .rmain{background:#fff}
  .content{padding:0}
  .view.hide{display:block!important}
  .card{break-inside:avoid;margin-bottom:16px}
  .hero{background:#fff}
}
/* ── Responsive ── */
@media(max-width:820px){
  .page{grid-template-columns:1fr}
  .lpanel{height:auto;position:static;border-right:0;border-bottom:.5px solid var(--B1)}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .matrix{grid-template-columns:1fr}
  .li,.tl-row{grid-template-columns:1fr;gap:4px}
  .row2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="page">

<!-- ═══ LEFT PANEL ═══ -->
<aside class="lpanel">
  <div class="p-logo">
    <div class="icon">🏛</div>
    <div class="info">
      <h1>考编备考全攻略</h1>
      <p>生成器 · 增强版 v2.0</p>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">基本信息</div>
    <label class="lab">学校名称</label>
    <input id="school" class="inp" value="齐鲁工业大学">
    <div class="g8"></div>
    <label class="lab">专业方向</label>
    <input id="major" class="inp" value="计算机科学与技术（物联网方向）">
    <div class="g8"></div>
    <div class="row2">
      <div>
        <label class="lab">毕业年月</label>
        <input id="grad" class="inp" value="2027-07" placeholder="YYYY-MM">
      </div>
      <div>
        <label class="lab">备考起点</label>
        <input id="start" class="inp" value="2026-06" placeholder="YYYY-MM">
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">地区策略</div>
    <div class="row2">
      <div>
        <label class="lab">目标省份</label>
        <select id="province" class="sel">
          <option>山东省</option>
          <option>江苏省</option>
          <option>浙江省</option>
          <option>广东省</option>
          <option>全国国考</option>
        </select>
      </div>
      <div>
        <label class="lab">城市策略</label>
        <select id="mode" class="sel">
          <option value="balanced">冲稳保</option>
          <option value="safe">求稳优先</option>
          <option value="top">核心城市冲刺</option>
        </select>
      </div>
    </div>
    <div class="g8"></div>
    <label class="lab">意向城市（可多个）</label>
    <input id="cities" class="inp" value="济南、青岛、烟台、潍坊、淄博">
  </div>

  <div class="sec">
    <div class="sec-label">个人信息</div>
    <div class="row2">
      <div>
        <label class="lab">政治面貌</label>
        <select id="pol" class="sel">
          <option>群众</option>
          <option>共青团员</option>
          <option>预备党员</option>
          <option>中共党员</option>
        </select>
      </div>
      <div>
        <label class="lab">学生干部</label>
        <select id="cadre" class="sel">
          <option>否</option>
          <option>班级干部</option>
          <option>院级干部</option>
          <option>校级干部</option>
        </select>
      </div>
    </div>
    <div class="g12"></div>
    <label class="lab">每日学习时间</label>
    <div class="range-wrap">
      <input id="hours" type="range" min="3" max="12" step="1" value="8">
      <span id="hoursText" class="range-val">8 小时</span>
    </div>
    <div class="g12"></div>
    <label class="lab">当前基础水平</label>
    <select id="base" class="sel">
      <option value="zero">零基础 / 刚开始</option>
      <option value="some">学过部分模块</option>
      <option value="mock">做过完整套卷</option>
    </select>
  </div>

  <div class="sec">
    <div class="sec-label">准备考试类型（可多选）</div>
    <div class="chips">
      <label class="chip"><input class="exam" type="checkbox" value="国考" checked><span>国考</span></label>
      <label class="chip"><input class="exam" type="checkbox" value="省考" checked><span>省考</span></label>
      <label class="chip"><input class="exam" type="checkbox" value="事业单位" checked><span>事业单位</span></label>
      <label class="chip"><input class="exam" type="checkbox" value="选调生"><span>选调生</span></label>
      <label class="chip"><input class="exam" type="checkbox" value="三支一扶" checked><span>三支一扶</span></label>
      <label class="chip"><input class="exam" type="checkbox" value="军队文职"><span>军队文职</span></label>
    </div>
  </div>

  <div class="btn-row">
    <button id="reset" class="btn2">↺ 恢复示例</button>
    <button id="printBtn" class="btn2">🖨 打印</button>
    <button id="reportBtn" class="btn">📄 生成报告</button>
  </div>
</aside>

<!-- ═══ RIGHT MAIN ═══ -->
<main class="rmain">
  <div class="hero">
    <div class="hero-title" id="head">考编备考全攻略生成器 · 增强版</div>
    <div class="hero-sub" id="desc">齐鲁工业大学 · 计算机科学与技术（物联网方向） · 2027-07 毕业</div>
    <div class="kpis">
      <div class="kpi"><div class="kpi-val" id="mNum">14</div><div class="kpi-lbl">备考月数</div></div>
      <div class="kpi"><div class="kpi-val" id="eNum">4</div><div class="kpi-lbl">考试通道</div></div>
      <div class="kpi"><div class="kpi-val" id="pNum">18+</div><div class="kpi-lbl">匹配岗位</div></div>
      <div class="kpi"><div class="kpi-val" id="target">75+</div><div class="kpi-lbl">行测目标</div></div>
    </div>
  </div>

  <nav class="tabs">
    <button class="tab on" data-tab="match">📋 匹配</button>
    <button class="tab" data-tab="city">📍 城市</button>
    <button class="tab" data-tab="month">📅 月计划</button>
    <button class="tab" data-tab="week">📆 周课表</button>
    <button class="tab" data-tab="xingce">📊 行测专项</button>
    <button class="tab" data-tab="shenlun">📝 申论专项</button>
    <button class="tab" data-tab="gongji">📚 公基专项</button>
    <button class="tab" data-tab="countdown">⏳ 倒排计划</button>
    <button class="tab" data-tab="report">📄 完整报告</button>
  </nav>

  <div class="content">
    <div id="match" class="view"></div>
    <div id="city" class="view hide"></div>
    <div id="month" class="view hide"></div>
    <div id="week" class="view hide"></div>
    <div id="xingce" class="view hide"></div>
    <div id="shenlun" class="view hide"></div>
    <div id="gongji" class="view hide"></div>
    <div id="countdown" class="view hide"></div>
    <div id="report" class="view hide"></div>
  </div>
</main>
</div>

<script>
var TODAY = new Date('2026-06-23T00:00:00');
var active = 'match';

function q(id){return document.getElementById(id)}
function v(id){return q(id).value.trim()}
function checked(){return Array.from(document.querySelectorAll('.exam:checked')).map(function(x){return x.value})}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function ymToDate(s){var p=s.split('-');return new Date(Number(p[0])||2026,(Number(p[1])||1)-1,1)}
function months(){
  var a=ymToDate(v('start')),b=ymToDate(v('grad'));
  return Math.max(1,(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())+1)
}

/* ── DATA: Professional Library ── */
var LIBS=[
  {name:'计算机信息类',icon:'💻',keys:['计算机','软件','网络','物联网','数据','信息','人工智能','通信','电子'],posts:[

  ]},
  {name:'财会经管类',icon:'💹',keys:['会计','财务','金融','经济','管理','工商','审计'],posts:[

  {name:'中文新闻类',icon:'📰',keys:['汉语言','新闻','传播','秘书','中文','文秘'],posts:[

    ['基层综合岗','街道/乡镇','材料、协调、群众工作','中低']

/* ── DATA: City Tiers ── */
var PROVINCES={
  '山东省':{top:['济南','青岛'],stable:['烟台','潍坊','临沂','淄博','济宁','威海'],safe:['泰安','德州','聊城','菏泽','枣庄','滨州','东营','日照']},
  '江苏省':{top:['南京','苏州'],stable:['无锡','常州','南通','扬州','镇江'],safe:['盐城','淮安','宿迁','连云港','泰州']},

function cat(){
  var m=v('major');
  for(var i=0;i<LIBS.length-1;i++){
    for(var j=0;j<LIBS[i].keys.length;j++){
      if(m.indexOf(LIBS[i].keys[j])>-1) return LIBS[i]
    }
  }
  return LIBS[LIBS.length-1]
}
function intensity(){
  var h=Number(v('hours'));
  return h>=9?'冲刺型（高强度）':h>=6?'标准型（均衡节奏）':'压缩型（时间有限）'
}
function baseHint(){
  var b=v('base');
  return b==='zero'?'先建立题型框架和方法体系，学方法优先于刷题量，理论:做题=4:6':
         b==='some'?'重点做弱项诊断和限时训练，真题优先，理论:做题=3:7':

}

function renderCountdown(){
  var ex=checked();
  var html='<div class="card"><div class="card-t">考试节点倒排计划</div><div class="tl">';
  var shown=0;
  EVENTS.forEach(function(e){
    if(ex.indexOf(e[0])<0) return;
    var dd=daysTo(e[1]);
    var cls=dd<0?'tag':dd<60?'tag ter':dd<120?'tag twa':'tag tok';
    var lbl=dd<0?'已过期':'剩余'+dd+'天';
    html+='<div class="tl-row">';
    html+='<div class="tl-dt">'+e[1]+'</div>';
    html+='<div class="tl-box">';
    html+='<b>'+esc(e[0])+' · '+esc(e[2])+' &nbsp;<span class="'+cls+'">'+lbl+'</span></b>';
    html+='<p>'+esc(e[3])+'</p>';
    html+='<p class="tl-hint">倒排节奏：前60%时间 → 方法学习+专项训练，中30% → 真题套卷+复盘，后10% → 只看错题本+热点素材</p>';
    html+='</div></div>';
    shown++
  });
  if(!shown) html+='<div style="padding:20px;text-align:center;color:var(--T3);font-size:13px">请在左侧勾选至少一种考试类型</div>';
  html+='</div><div class="note wn">日期以 2026-06-23 为基准计算剩余天数。实际使用时请结合当年公告的正式日期调整备考节奏。</div></div>';
  q('countdown').innerHTML=html
}

function renderReport(){
  var html='<div class="card">';
  html+='<div class="card-t">完整备考攻略报告 <button id="copyBtn" class="btn2" style="margin:0;height:28px;font-size:11px">📋 复制全文</button></div>';
  html+='<div class="mono" id="repText">'+esc(reportText())+'</div>';
  html+='</div>';
  q('report').innerHTML=html;
  var btn=q('copyBtn');
  if(btn){
    btn.addEventListener('click',function(){
      var txt=reportText();
      function done(){btn.textContent='✅ 已复制';setTimeout(function(){btn.textContent='📋 复制全文'},2000)}
      if(navigator.clipboard){navigator.clipboard.writeText(txt).then(done).catch(function(){fallback(txt,done)})}
      else{fallback(txt,done)}
    })
  }
  function fallback(txt,cb){
    var ta=document.createElement('textarea');
    ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');cb()}catch(e){}
    document.body.removeChild(ta)
  }
}
